// ── STATE ─────────────────────────────────────────────────────────────────────
let state = {
  page: "events",        // events | event | mission | search | admin | login
  currentUser: null,     // Firebase user
  userMeta: null,        // { nom, role, eventIds }
  events: [],
  currentEventId: null,
  missions: [],
  currentMissionId: null,
  filterCat: "Toutes",
  searchQ: "",
  loading: true,
  toast: null,
  modal: null,           // { type, data }
  unsubMissions: null,
  _missionDraft: {},     // temp storage for mission form fields across tabs
};

// ── FIRESTORE HELPERS ─────────────────────────────────────────────────────────
const eventsCol = () => collection(db, "events");
const eventDoc = (eid) => doc(db, "events", eid);
const missionsCol = (eid) => collection(db, "events", eid, "missions");
const missionDoc = (eid, mid) => doc(db, "events", eid, "missions", mid);
const usersCol = () => collection(db, "users");
const userDoc = (uid) => doc(db, "users", uid);

async function initFirestore() {
  // Créer les events s'ils n'existent pas
  for (const ev of INITIAL_EVENTS) {
    const snap = await getDoc(eventDoc(ev.id));
    if (!snap.exists()) {
      await setDoc(eventDoc(ev.id), { ...ev, createdAt: serverTimestamp() });
      // Créer les missions initiales
      for (const m of INITIAL_MISSIONS) {
        await addDoc(missionsCol(ev.id), { ...m, createdAt: serverTimestamp() });
      }
    }
  }
}

async function loadEvents() {
  const snap = await getDocs(eventsCol());
  state.events = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  state.events.sort((a,b) => a.date > b.date ? 1 : -1);
}

function subscribeToMissions(eventId) {
  if (state.unsubMissions) state.unsubMissions();
  state.unsubMissions = onSnapshot(missionsCol(eventId), (snap) => {
    state.missions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  });
}

async function loadUserMeta(uid) {
  const snap = await getDoc(userDoc(uid));
  if (snap.exists()) return snap.data();
  return null;
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  state.currentUser = user;
  if (user) {
    state.userMeta = await loadUserMeta(user.uid);
    if (!state.userMeta) {
      // Premier superAdmin : v.vieilfault
      if (user.email === "v.vieilfault@unionpourlenfance.com") {
        const meta = { nom:"Victor Vieilfault", email:user.email, role:"superAdmin", eventIds:[] };
        await setDoc(userDoc(user.uid), meta);
        state.userMeta = meta;
      } else {
        const meta = { nom:user.email, email:user.email, role:"admin", eventIds:[] };
        await setDoc(userDoc(user.uid), meta);
        state.userMeta = meta;
      }
    }
  } else {
    state.userMeta = null;
  }
  state.loading = false;
  render();
});

async function doLogin(email, password) {
  try {
    await signInWithEmailAndPassword(auth, email, password);
    showToast("Bienvenue !");
    state.page = "events";
    render();
  } catch(e) {
    return "Email ou mot de passe incorrect.";
  }
}
async function doLogout() {
  if (state.unsubMissions) state.unsubMissions();
  await signOut(auth);
  state.page = "events";
  state.currentEventId = null;
  showToast("Déconnecté.");
}

// ── GETTERS ───────────────────────────────────────────────────────────────────
const isAdmin = () => state.userMeta && (state.userMeta.role === "admin" || state.userMeta.role === "superAdmin");
const isSuperAdmin = () => state.userMeta?.role === "superAdmin";
const currentEvent = () => state.events.find(e => e.id === state.currentEventId);
const currentMission = () => state.missions.find(m => m.id === state.currentMissionId);

// ── MUTATIONS ─────────────────────────────────────────────────────────────────
async function saveMission(data, isDraft=false, eid=null) {
  const eventId = eid || state.currentEventId;
  if (!eventId) { showToast("⚠️ Événement introuvable."); return; }
  if (data.id) {
    const { id, ...rest } = data;
    await setDoc(missionDoc(eventId, id), { ...rest, updatedAt: serverTimestamp() });
    showToast(isDraft ? "📝 Brouillon mis à jour !" : "✅ Mission mise à jour !");
  } else {
    await addDoc(missionsCol(eventId), { ...data, createdAt: serverTimestamp() });
    showToast(isDraft ? "📝 Brouillon enregistré !" : "✅ Mission créée !");
  }
  closeModal();
}

async function deleteMission(mid) {
  if (!confirm("Supprimer cette mission ?")) return;
  await deleteDoc(missionDoc(state.currentEventId, mid));
  showToast("🗑️ Mission supprimée.");
  state.page = "event";
  render();
}

async function updateMissionField(mid, field, value) {
  await updateDoc(missionDoc(state.currentEventId, mid), { [field]: value });
}

async function addInscrit(mid, data) {
  const m = currentMission();
  const inscrits = [...(m.inscrits||[]), { id: Date.now(), ...data }];
  await updateMissionField(mid, "inscrits", inscrits);
  showToast("🎉 Inscription confirmée !");
  closeModal();
}

async function toggleTache(mid, tIdx) {
  const m = currentMission();
  const taches = m.taches.map((t,i) => i===tIdx ? {...t, fait:!t.fait} : t);
  await updateMissionField(mid, "taches", taches);
}

async function saveTache(mid, tache, tIdx) {
  const m = currentMission();
  let taches;
  if (tIdx !== null && tIdx !== undefined) {
    taches = m.taches.map((t,i) => i===tIdx ? tache : t);
  } else {
    taches = [...(m.taches||[]), { ...tache, fait:false }];
  }
  await updateMissionField(mid, "taches", taches);
  showToast("✅ Tâche enregistrée !"); closeModal();
}

async function deleteTache(mid, tIdx) {
  const m = currentMission();
  const taches = m.taches.filter((_,i) => i!==tIdx);
  await updateMissionField(mid, "taches", taches);
  showToast("🗑️ Tâche supprimée.");
}

async function saveFaq(mid, item, fIdx) {
  const m = currentMission();
  let faq;
  const entry = { ...item, auteur: state.userMeta?.nom || "Admin", date: today() };
  if (fIdx !== null && fIdx !== undefined) {
    faq = (m.faq||[]).map((f,i) => i===fIdx ? entry : f);
  } else {
    faq = [...(m.faq||[]), entry];
  }
  await updateMissionField(mid, "faq", faq);
  showToast("✅ FAQ mise à jour !"); closeModal();
}

async function deleteFaq(mid, fIdx) {
  const m = currentMission();
  const faq = (m.faq||[]).filter((_,i) => i!==fIdx);
  await updateMissionField(mid, "faq", faq);
  showToast("🗑️ Question supprimée.");
}

async function addComment(mid, auteur, texte) {
  const m = currentMission();
  const commentaires = [...(m.commentaires||[]), { auteur, texte, date: nowStr() }];
  await updateMissionField(mid, "commentaires", commentaires);
  showToast("💬 Commentaire ajouté !"); closeModal();
}

async function saveLien(mid, lien, lIdx) {
  const m = currentMission();
  let liensUtiles;
  if (lIdx !== null && lIdx !== undefined) {
    liensUtiles = (m.liensUtiles||[]).map((l,i) => i===lIdx ? lien : l);
  } else {
    liensUtiles = [...(m.liensUtiles||[]), lien];
  }
  await updateMissionField(mid, "liensUtiles", liensUtiles);
  showToast("✅ Lien enregistré !"); closeModal();
}

async function deleteLien(mid, lIdx) {
  const m = currentMission();
  const liensUtiles = (m.liensUtiles||[]).filter((_,i) => i!==lIdx);
  await updateMissionField(mid, "liensUtiles", liensUtiles);
  showToast("🗑️ Lien supprimé.");
}

// ── EVENT CRUD ────────────────────────────────────────────────────────────────
async function saveEvent(data) {
  if (data.id) {
    const { id, ...rest } = data;
    await setDoc(eventDoc(id), rest, { merge: true });
    showToast("✅ Événement mis à jour !");
  } else {
    const id = data.hashtag.replace(/[^a-zA-Z0-9]/g, "").toLowerCase();
    await setDoc(eventDoc(id), { ...data, id, createdAt: serverTimestamp() });
    showToast("✅ Événement créé !");
  }
  await loadEvents();
  closeModal(); render();
}

async function deleteEvent(eid) {
  if (!confirm("Supprimer cet événement et toutes ses missions ?")) return;
  const mSnap = await getDocs(missionsCol(eid));
  const batch = writeBatch(db);
  mSnap.docs.forEach(d => batch.delete(d.ref));
  batch.delete(eventDoc(eid));
  await batch.commit();
  await loadEvents();
  showToast("🗑️ Événement supprimé.");
  render();
}

async function cloneEvent(sourceId, newData) {
  const newId = newData.hashtag.replace(/[^a-zA-Z0-9]/g, "").toLowerCase();
  await setDoc(eventDoc(newId), { ...newData, id: newId, createdAt: serverTimestamp() });
  const mSnap = await getDocs(missionsCol(sourceId));
  for (const d of mSnap.docs) {
    const m = d.data();
    // Reset inscrits/commentaires, keep structure
    await addDoc(missionsCol(newId), { ...m, inscrits:[], commentaires:[], faq:[], taches:(m.taches||[]).map(t=>({...t,fait:false,responsableId:null})), createdAt:serverTimestamp() });
  }
  await loadEvents();
  showToast("✅ Événement cloné !"); closeModal(); render();
}

// ── USER MGMT ─────────────────────────────────────────────────────────────────
async function loadAllUsers() {
  const snap = await getDocs(usersCol());
  return snap.docs.map(d => ({ uid: d.id, ...d.data() }));
}
async function saveUserMeta(uid, data) {
  await setDoc(userDoc(uid), data, { merge:true });

// ── HELPERS ───────────────────────────────────────────────────────────────────
const today = () => new Date().toISOString().split("T")[0];
const nowStr = () => new Date().toLocaleString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
const fmt = (d) => { if(!d) return ""; const [y,m,j]=d.split("-"); return `${j}/${m}/${y}`; };
const fmtDate = (d) => { if(!d) return ""; return new Date(d).toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"}); };

const missionDateLabel = (m) => {
  const d1 = m.dateDebut || "";
  const d2 = m.dateFin || "";
  const h1 = m.rdvHeure || "";
  const h2 = m.finHeure || "";
  const noH = m.sansHoraire;
  if (!d1) return h1 ? h1 + (h2 ? " → " + h2 : "") : "";
  if (m.dateType === "plage" && d2 && d2 !== d1) {
    const label = fmtDate(d1) + " → " + fmtDate(d2);
    return noH ? label : (label + (h1 ? " · " + h1 + (h2 ? "–" + h2 : "") : ""));
  }
  const label = fmtDate(d1);
  return noH ? label : (label + (h1 ? " · " + h1 + (h2 ? "–" + h2 : "") : ""));
};

const isMultiDay = (m) => m.dateType === "plage" && m.dateFin && m.dateFin !== m.dateDebut;
const initials = (n) => (n||"?").split(" ").map(x=>x[0]).join("").slice(0,2).toUpperCase();
const pct = (taches) => { if(!taches?.length) return 0; return Math.round(taches.filter(t=>t.fait).length/taches.length*100); };

function showToast(msg) {
  state.toast = msg;
  render();
  setTimeout(() => { state.toast = null; render(); }, 3000);
}
function openModal(type, data={}) {
  if (type === "mission") {
    state._missionDraft = {};
    state._modalMissionTab = "infos";
    // Always use live state.currentEventId, never a frozen string
    state._missionEid = state.currentEventId || data.eid || "";
  }
  state.modal = { type, data };
  render();
}
function closeModal() { state.modal = null; state._missionDraft = {}; state._modalMissionTab = "infos"; render(); }

function navigate(page, opts={}) {
  state.page = page;
  if (opts.eventId !== undefined) state.currentEventId = opts.eventId;
  if (opts.missionId !== undefined) state.currentMissionId = opts.missionId;
  if (opts.eventId && page === "event") subscribeToMissions(opts.eventId);
  render();
}

const icon = (name, size=20, color="currentColor") => `<svg width="${size}" height="${size}" fill="none" stroke="${color}" viewBox="0 0 24 24" style="flex-shrink:0;vertical-align:middle">${ICONS[name]||""}</svg>`;

// ── HTML BUILDERS ─────────────────────────────────────────────────────────────
const badge = (cat) => `<span style="background:${CAT_COLORS[cat]||C.gray};color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;font-family:'Montserrat',sans-serif;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap">${cat}</span>`;

const roleBadge = (role) => {
  if (role==="superAdmin") return `<span style="background:#6c3483;color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;font-family:'Montserrat',sans-serif">👑 Super Admin</span>`;
  if (role==="admin") return `<span style="background:${C.orangeVif};color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;font-family:'Montserrat',sans-serif">⚙️ Admin</span>`;
  return "";
};

const progressBar = (taches) => {
  const t = taches||[]; const done=t.filter(x=>x.fait).length; const p=t.length?Math.round(done/t.length*100):0;
  return `<div style="margin-top:8px"><div style="display:flex;justify-content:space-between;font-size:11px;color:${C.gray};margin-bottom:3px"><span>${done}/${t.length} tâches</span><span style="font-weight:700;color:${p===100?C.green:C.orangeVif}">${p}%</span></div><div style="height:5px;background:#eee;border-radius:99px;overflow:hidden"><div style="height:100%;width:${p}%;background:${p===100?C.green:`linear-gradient(90deg,${C.magenta},${C.orangeVif})`};border-radius:99px;transition:width .4s"></div></div></div>`;
};

const hdr = (bg, content) => `<div style="background:${bg||`linear-gradient(135deg,${C.magenta},${C.orangeVif})`};padding:14px 15px 18px;position:sticky;top:0;z-index:100">${content}</div>`;

const card = (content, onclick, style="") => `<div onclick="${onclick}" style="background:#fff;border-radius:16px;padding:15px;margin-bottom:11px;box-shadow:0 2px 12px rgba(0,0,0,.07);cursor:pointer;${style}" onmouseenter="this.style.transform='translateY(-2px)';this.style.boxShadow='0 6px 20px rgba(0,0,0,.12)'" onmouseleave="this.style.transform='';this.style.boxShadow='0 2px 12px rgba(0,0,0,.07)'">${content}</div>`;

const sectionCard = (content, style="") => `<div style="background:#fff;border-radius:16px;padding:15px;margin-bottom:11px;box-shadow:0 2px 12px rgba(0,0,0,.07);${style}">${content}</div>`;

const inp = (id, type="text", placeholder="", value="", style="") => `<input id="${id}" type="${type}" value="${value.replace(/"/g,'&quot;')}" placeholder="${placeholder}" style="width:100%;padding:11px 13px;border:2px solid #eee;border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;outline:none;${style}" onfocus="this.style.borderColor='${C.magenta}'" onblur="this.style.borderColor='#eee'"/>`;

const sel = (id, options, value="") => `<select id="${id}" style="width:100%;padding:11px 13px;border:2px solid #eee;border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;outline:none">${options.map(o=>`<option value="${o.v||o}" ${(o.v||o)===value?'selected':''}>${o.l||o}</option>`).join("")}</select>`;

const txt = (id, placeholder="", value="", rows=3) => `<textarea id="${id}" rows="${rows}" placeholder="${placeholder}" style="width:100%;padding:11px 13px;border:2px solid #eee;border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;outline:none;resize:vertical" onfocus="this.style.borderColor='${C.magenta}'" onblur="this.style.borderColor='#eee'">${value}</textarea>`;

const field = (label, content) => `<div style="margin-bottom:13px"><label style="display:block;font-size:11px;font-weight:700;color:${C.dark};margin-bottom:4px;font-family:'Poppins',sans-serif;text-transform:uppercase;letter-spacing:.4px">${label}</label>${content}</div>`;

const btnPri = (label, onclick, disabled=false, style="") => `<button onclick="${onclick}" ${disabled?'disabled':''} style="padding:13px 20px;background:${disabled?'#ccc':`linear-gradient(135deg,${C.magenta},${C.orangeVif})`};color:#fff;border:none;border-radius:12px;font-family:'Montserrat',sans-serif;font-weight:800;font-size:14px;cursor:${disabled?'not-allowed':'pointer'};width:100%;${style}">${label}</button>`;

const btnSm = (label, onclick, color=C.magenta) => `<button onclick="${onclick}" style="background:${color}18;border:none;border-radius:8px;padding:5px 10px;cursor:pointer;font-size:11px;font-weight:700;color:${color};font-family:'Montserrat',sans-serif">${label}</button>`;

const nav = () => {
  const items = [
    { id:"events", label:"Accueil", icon:"home" },
    { id:"event",  label:"Missions", icon:"list" },
    { id:"search", label:"Recherche", icon:"search" },
    { id: isAdmin() ? "admin" : "login", label:"Admin", icon: isAdmin() ? "star" : "lock" },
  ];
  return `<nav style="position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;display:flex;box-shadow:0 -2px 20px rgba(0,0,0,.1);z-index:200">
    ${items.map(it => {
      const active = state.page === it.id || (it.id==="event" && state.page==="mission");
      return `<button onclick="navigate('${it.id}'${it.id==='event'&&state.currentEventId?`,{eventId:'${state.currentEventId}'}`:''})" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 7px;cursor:pointer;border:none;background:none;gap:3px;border-top:3px solid ${active?C.magenta:'transparent'}">
        ${icon(it.icon, 21, active?C.magenta:C.gray)}
        <span style="font-size:9px;font-weight:${active?700:500};color:${active?C.magenta:C.gray}">${it.label}</span>
      </button>`;
    }).join("")}
  </nav>`;
};

const modal = (title, content) => `
  <div id="modal-overlay"  style="position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;display:flex;align-items:flex-end;justify-content:center">
    <div style="background:#fff;width:100%;max-width:500px;border-radius:20px 20px 0 0;padding:22px;max-height:94vh;overflow-y:auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
        <h3 style="margin:0;font-family:'Montserrat',sans-serif;font-weight:800;font-size:16px;color:${C.dark}">${title}</h3>
        <button onclick="closeModal()" style="background:none;border:none;cursor:pointer;padding:4px">${icon("x",21,C.gray)}</button>
      </div>
      ${content}
    </div>
  </div>`;

// ── PAGE: EVENTS ──────────────────────────────────────────────────────────────

  return `
    ${hdr(null, `
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="color:#fff;font-family:'Montserrat',sans-serif;font-weight:900;font-size:21px;letter-spacing:-.5px">🤝 Défi Enfance</div>

        </div>
        ${state.currentUser
          ? `<button onclick="doLogout()" style="background:rgba(255,255,255,.2);border:none;border-radius:10px;padding:7px 11px;cursor:pointer;color:#fff;display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600">${icon("logout",14,"#fff")} ${(state.userMeta?.nom||"").split(" ")[0]}</button>`
          : `<button onclick="navigate('login')" style="background:rgba(255,255,255,.2);border:none;border-radius:10px;padding:7px 11px;cursor:pointer;color:#fff;display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600">${icon("lock",14,"#fff")} Connexion</button>`
        }

        <div style="position:absolute;right:-20px;top:-20px;width:100px;height:100px;background:rgba(255,255,255,.07);border-radius:50%"></div>
        <p style="margin:0 0 3px;font-size:11px;font-weight:600;opacity:.9;text-transform:uppercase;letter-spacing:1px">Espace bénévoles</p>

      ${ev.map(e => card(`

          ${isAdmin() ? `<div style="display:flex;gap:5px">

// ── PAGE: EVENT (liste missions) ──────────────────────────────────────────────
function pageEvent() {
  const ev = currentEvent();
  if (!ev) return `<div style="padding:40px;text-align:center;color:${C.gray}">Événement introuvable.</div>`;
  const allVisible = isAdmin() ? state.missions : state.missions.filter(m=>m.statut!=="brouillon");
  const filtered = state.filterCat === "Toutes" ? allVisible : allVisible.filter(m=>m.categorie===state.filterCat);
  const bg = `linear-gradient(135deg,${ev.couleur||C.magenta},${C.orange})`;
  const totalI = state.missions.reduce((s,m)=>s+(m.inscrits||[]).length,0);
  const totalB = state.missions.reduce((s,m)=>s+(m.nbBenevoles||0),0);

  return `
    ${hdr(bg, `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <button onclick="navigate('events')" style="background:rgba(255,255,255,.2);border:none;border-radius:10px;padding:7px 12px;cursor:pointer;color:#fff;display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600">${icon("arrow",14,"#fff")} Événements</button>
        <span style="color:rgba(255,255,255,.8);font-size:12px">${filtered.length} mission${filtered.length>1?"s":""}</span>
      </div>
      <div style="color:#fff;font-family:'Montserrat',sans-serif;font-weight:900;font-size:18px">${ev.hashtag}</div>
      <div style="color:rgba(255,255,255,.85);font-size:12px;margin-top:2px">${ev.lieu} · ${fmtDate(ev.date)}</div>
    `)}
    <div style="position:relative;margin:0">
      <div id="cat-scroll-bar" style="display:flex;gap:7px;overflow-x:auto;padding:12px 15px 8px;scrollbar-width:none;-webkit-overflow-scrolling:touch" onscroll="updateCatArrows()">
        ${CATEGORIES.map(c=>`<button onclick="state.filterCat='${c}';render()" style="padding:6px 14px;border-radius:99px;border:2px solid ${state.filterCat===c?C.magenta:"#eee"};background:${state.filterCat===c?C.magenta:"#fff"};color:${state.filterCat===c?"#fff":C.dark};font-family:'Montserrat',sans-serif;font-weight:700;font-size:11px;cursor:pointer;white-space:nowrap;flex-shrink:0">${c}</button>`).join("")}
      </div>
      <div id="cat-arrow-left" onclick="document.getElementById('cat-scroll-bar').scrollBy({left:-120,behavior:'smooth'})" style="display:none;position:absolute;left:0;top:50%;transform:translateY(-50%);background:linear-gradient(to right,#fff 60%,transparent);padding:8px 14px 8px 6px;cursor:pointer;font-size:16px;color:${C.dark};z-index:10;border:none">‹</div>
      <div id="cat-arrow-right" onclick="document.getElementById('cat-scroll-bar').scrollBy({left:120,behavior:'smooth'})" style="display:none;position:absolute;right:0;top:50%;transform:translateY(-50%);background:linear-gradient(to left,#fff 60%,transparent);padding:8px 6px 8px 14px;cursor:pointer;font-size:16px;color:${C.dark};z-index:10;border:none">›</div>
    </div>
    <script>
      function updateCatArrows() {
        const el = document.getElementById("cat-scroll-bar");
        if (!el) return;
        const left = document.getElementById("cat-arrow-left");
        const right = document.getElementById("cat-arrow-right");
        if (left)  left.style.display  = el.scrollLeft > 5 ? "block" : "none";
        if (right) right.style.display = el.scrollLeft < (el.scrollWidth - el.clientWidth - 5) ? "block" : "none";
      }
      setTimeout(() => updateCatArrows(), 100);
    <\/script>

    <div style="padding:0 15px">
      <!-- Stats rapides -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px">
        ${[["👥","Bénévoles",`${totalI}/${totalB}`,C.magenta],["✅","Tâches",state.missions.reduce((s,m)=>s+(m.taches||[]).filter(t=>t.fait).length,0)+"/"+state.missions.reduce((s,m)=>s+(m.taches||[]).length,0),C.green]].map(([e,l,v,col])=>`
          <div style="background:#fff;border-radius:12px;padding:11px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.06)">
            <div style="font-size:18px">${e}</div>
            <div style="font-family:'Montserrat',sans-serif;font-weight:900;font-size:16px;color:${col}">${v}</div>
            <div style="font-size:9px;color:${C.gray};font-weight:700;text-transform:uppercase">${l}</div>
          </div>`).join("")}
      </div>

      <!-- Recherche -->
      <div onclick="navigate('search')" style="display:flex;align-items:center;gap:10px;background:#fff;border-radius:12px;padding:12px 15px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.06);cursor:pointer;border:2px solid #eee">
        ${icon("search",17,C.gray)} <span style="font-size:14px;color:${C.gray}">Missions, tâches, FAQ…</span>
      </div>

      ${filtered.length === 0 ? `<div style="text-align:center;padding:40px;color:${C.gray}"><p style="font-size:36px">🏃</p><p>Aucune mission dans cette catégorie.</p></div>` :
        filtered.map(m => {
          const places = (m.nbBenevoles||0) - (m.inscrits||[]).length;
          return card(`
            <div style="display:flex;justify-content:space-between;margin-bottom:5px">
              <div style="display:flex;gap:5px;align-items:center">${badge(m.categorie)}${m.statut==="brouillon"?`<span style="background:#f39c12;color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;font-family:'Montserrat',sans-serif">BROUILLON</span>`:""}</div>
              <span style="font-size:11px;font-weight:700;color:${places<=0?C.red:places<=2?C.orangeVif:C.green}">${places<=0?"Complet":`${places} place${places>1?"s":""}`}</span>
            </div>
            <h4 style="margin:6px 0 5px;font-family:'Montserrat',sans-serif;font-weight:800;font-size:14px;color:${C.dark};line-height:1.3">${m.titre}</h4>
            <div style="font-size:11px;color:${C.gray};display:flex;flex-wrap:wrap;gap:8px;margin-bottom:5px">
              ${isMultiDay(m) ? `<span style="background:#8e44ad18;color:#8e44ad;font-weight:700;border-radius:6px;padding:2px 7px;font-size:10px">📅 Multi-jours</span>` : ""}
              <span>${missionDateLabel(m) || (m.rdvHeure ? "🕐 " + m.rdvHeure + (m.finHeure ? "–" + m.finHeure : "") : "")}</span>
              <span>📍 ${(m.lieu||"").length>30?m.lieu.slice(0,30)+"…":m.lieu}</span>
              <span>👥 ${(m.inscrits||[]).length}/${m.nbBenevoles}</span>
            </div>
            ${progressBar(m.taches)}
          `, `navigate('mission',{missionId:'${m.id}',eventId:'${state.currentEventId}'})`);
        }).join("")
      }
      <div style="height:10px"></div>
    </div>
    ${nav()}`;
}

// ── PAGE: MISSION ─────────────────────────────────────────────────────────────
function pageMission() {
  const m = currentMission();
  const ev = currentEvent();
  if (!m) return `<div style="padding:40px;text-align:center;color:${C.gray}">Mission introuvable.</div>`;
  const places = (m.nbBenevoles||0)-(m.inscrits||[]).length;
  const accentBg = `linear-gradient(135deg,${CAT_COLORS[m.categorie]||C.magenta},${C.orange})`;
  const tab = state._missionTab||"brief";

  const tabs = [["brief","📋 Brief"],["taches","✅ Tâches"],["faq","❓ FAQ"],["commentaires","💬 Avis"],["equipe","👥 Équipe"]];

  let tabContent = "";
  if (tab==="brief") {
    tabContent = sectionCard([
      ["🎯 Objectifs & résultats attendus", m.brief?.objectifs],
      ["🛠️ Technique de travail", m.brief?.technique],
      ["🤝 Travailler avec les autres", m.brief?.collaboration],
      ["📊 Évaluation finale", m.brief?.evaluation],
    ].map(([title,text])=>`
      <div style="margin-bottom:16px">
        <div style="font-family:'Montserrat',sans-serif;font-weight:800;font-size:12px;color:${C.magenta};text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px">${title}</div>
        <p style="margin:0;font-size:13px;line-height:1.75;color:#444">${text||`<span style="color:${C.gray};font-style:italic">Non renseigné</span>`}</p>
      </div>`).join(""));
  }
  if (tab==="taches") {
    const taches = m.taches||[];
    tabContent = sectionCard(`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-family:'Montserrat',sans-serif;font-weight:800;font-size:12px;color:${C.dark};text-transform:uppercase">✅ Tâches</div>
        ${isAdmin()?btnSm("+ Tâche",`openModal('tache',{mid:'${m.id}',tIdx:null})`):""}
      </div>
      ${progressBar(taches)}
      <div style="margin-top:12px">
        ${taches.length===0?`<p style="text-align:center;color:${C.gray};font-size:13px;padding:16px 0">Aucune tâche définie.</p>`:
          taches.map((t,i)=>{

  if (tab==="faq") {

    tabContent = sectionCard(`

      ${faq.length===0?`<p style="text-align:center;color:${C.gray};font-size:13px;padding:16px 0">${isAdmin()?"Ajoutez la première question !":"Aucune question pour l'instant."}</p>`:
        faq.map((f,i)=>`

                <button onclick="deleteFaq('${m.id}',${i})" style="background:#fff0f0;border:none;border-radius:7px;padding:4px 6px;cursor:pointer">${icon("trash",12,C.red)}</button>

  if (tab==="commentaires") {

    tabContent = sectionCard(`

  if (tab==="equipe") {

    tabContent = sectionCard(`

            <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,${C.magenta},${C.orangeVif});display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;flex-shrink:0">${initials(p.prenom+" "+p.nom)}</div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <button onclick="navigate('event',{eventId:'${state.currentEventId}'})" style="background:rgba(255,255,255,.2);border:none;border-radius:10px;padding:7px 12px;cursor:pointer;color:#fff;display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600">${icon("arrow",14,"#fff")} Missions</button>
        ${isAdmin()?`<button onclick="openMissionModal('${encodeURIComponent(JSON.stringify(m))}')" style="background:rgba(255,255,255,.2);border:none;border-radius:8px;padding:6px 10px;cursor:pointer;color:#fff;display:flex;gap:4px;align-items:center;font-size:11px;font-weight:600">${icon("edit",13,"#fff")} Modifier</button>`:""}

      ${badge(m.categorie)}${m.statut==="brouillon"?`<span style="background:#f39c12;color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:99px;margin-left:6px">📝 BROUILLON</span>`:""}
      <h2 style="margin:7px 0 0;color:#fff;font-family:'Montserrat',sans-serif;font-weight:900;font-size:18px;line-height:1.3">${m.titre}</h2>
    </div>

    <div style="padding:0 15px">
      <!-- Infos pratiques -->
      ${sectionCard(`
        <div style="font-family:'Montserrat',sans-serif;font-weight:800;font-size:12px;color:${C.dark};text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">📋 Infos pratiques</div>
        ${[["calendar","Date & horaire", missionDateLabel(m)||"—"],["clock","Brief équipe",m.briefingHeure?`${m.briefingHeure} — sur place`:"—"],["pin","Lieu",m.lieu],["users","Équipe",`${(m.inscrits||[]).length}/${m.nbBenevoles} inscrits`]].map(([ico,label,val])=>`
          <div style="display:flex;align-items:flex-start;gap:9px;margin-bottom:9px">
            <div style="background:${C.grayLight};border-radius:7px;padding:6px;flex-shrink:0">${icon(ico,14,C.magenta)}</div>
            <div><div style="font-size:10px;color:${C.gray};font-weight:700;text-transform:uppercase;letter-spacing:.4px">${label}</div><div style="font-size:13px;color:${C.dark};font-weight:600">${val}</div></div>
          </div>`).join("")}
        ${m.chefMission?.nom?`
          <div style="border-top:1px solid #f0f0f0;padding-top:10px;margin-top:4px">
            <div style="font-size:10px;color:${C.gray};font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:7px">👑 Chef de mission</div>
            <div style="display:flex;align-items:center;gap:10px">
              <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,${C.magenta},${C.orangeVif});display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:13px;flex-shrink:0">${initials(m.chefMission.nom)}</div>
              <div>
                <div style="font-weight:700;font-size:13px;color:${C.dark}">${m.chefMission.nom}</div>
                <div style="font-size:11px;display:flex;gap:8px;flex-wrap:wrap;margin-top:2px">
                  <a href="mailto:${m.chefMission.email}" style="color:${C.magenta};text-decoration:none">✉️ ${m.chefMission.email}</a>
                  <a href="tel:${m.chefMission.tel}" style="color:${C.orangeVif};text-decoration:none">📱 ${m.chefMission.tel}</a>
                </div>
              </div>
            </div>
          </div>`:""}
      `)}

      <!-- Liens utiles -->
      ${((m.liensUtiles||[]).length>0||isAdmin())?sectionCard(`
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div style="font-family:'Montserrat',sans-serif;font-weight:800;font-size:12px;color:${C.dark};text-transform:uppercase">🔗 Liens & Outils</div>
          ${isAdmin()?btnSm("+ Ajouter",`openModal('lien',{mid:'${m.id}',lIdx:null})`):""}
        </div>
        ${(m.liensUtiles||[]).map((l,i)=>`
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
            <a href="${l.url}" target="_blank" style="flex:1;display:flex;align-items:center;gap:9px;background:${C.magenta}12;border-radius:10px;padding:9px 12px;text-decoration:none;border:1px solid ${C.magenta}25">
              ${icon("link",14,C.magenta)} <span style="font-size:13px;font-weight:600;color:${C.dark}">${l.label}</span><span style="margin-left:auto;font-size:10px;color:${C.gray}">↗</span>
            </a>
            ${isAdmin()?`<button onclick="deleteLien('${m.id}',${i})" style="background:#fff0f0;border:none;border-radius:8px;padding:7px 8px;cursor:pointer">${icon("trash",13,C.red)}</button>`:""}
          </div>`).join("")}
        ${(m.liensUtiles||[]).length===0?`<p style="font-size:12px;color:${C.gray};margin:0">Aucun lien pour l'instant.</p>`:""}
      `):""}

      <!-- Video -->
      ${m.videoUrl?sectionCard(`
        <div style="font-family:'Montserrat',sans-serif;font-weight:800;font-size:12px;color:${C.dark};text-transform:uppercase;margin-bottom:10px">🎬 Vidéo tutoriel</div>
        <div style="border-radius:12px;overflow:hidden;aspect-ratio:16/9"><iframe src="${m.videoUrl}" style="width:100%;height:100%;border:none" allowfullscreen></iframe></div>
      `):""}

      <!-- Tabs -->
      <div style="display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none">
        ${tabs.map(([k,l])=>`<button onclick="state._missionTab='${k}';render()" style="padding:7px 12px;border-radius:99px;border:2px solid ${tab===k?C.magenta:"#eee"};background:${tab===k?C.magenta:"#fff"};color:${tab===k?"#fff":C.dark};font-family:'Montserrat',sans-serif;font-weight:700;font-size:11px;cursor:pointer;white-space:nowrap">${l}</button>`).join("")}
      </div>

      ${tabContent}

      ${btnPri(places<=0?"Mission complète":"✊ Je rejoins cette mission !",`openModal('inscription',{mid:'${m.id}'})`,places<=0,`margin-bottom:20px;opacity:${places<=0?.5:1}`)}
    </div>`;
}

// ── PAGE: SEARCH ──────────────────────────────────────────────────────────────
function pageSearch() {
  const q = (state.searchQ||"").toLowerCase().trim();
  let results = [];
  if (q) {
    state.missions.forEach(m => {
      const inBrief = Object.values(m.brief||{}).some(v=>v?.toLowerCase().includes(q));
      if (m.titre.toLowerCase().includes(q)||inBrief) results.push({type:"mission",icon:"list",color:C.magenta,mid:m.id,label:m.titre,sub:m.categorie});
      (m.taches||[]).forEach((t,i)=>{ if(t.texte.toLowerCase().includes(q)) results.push({type:"tache",icon:"check",color:C.green,mid:m.id,label:t.texte,sub:`↳ ${m.titre}`}); });
      (m.faq||[]).forEach((f,i)=>{ if(f.question.toLowerCase().includes(q)||f.reponse.toLowerCase().includes(q)) results.push({type:"faq",icon:"question",color:C.orangeVif,mid:m.id,label:f.question,sub:`↳ ${m.titre}`}); });
      (m.commentaires||[]).forEach(c=>{ if(c.texte.toLowerCase().includes(q)) results.push({type:"commentaire",icon:"chat",color:"#8e44ad",mid:m.id,label:c.texte.slice(0,55)+(c.texte.length>55?"…":""),sub:`↳ ${m.titre}`}); });
    });
  }
  const typeLabel = {mission:"Mission",tache:"Tâche",faq:"FAQ",commentaire:"Commentaire"};
  return `
    ${hdr(null,`
      <div style="display:flex;align-items:center;gap:9px">
        <button onclick="navigate('event',{eventId:'${state.currentEventId}'})" style="background:rgba(255,255,255,.2);border:none;border-radius:10px;padding:8px 10px;cursor:pointer;flex-shrink:0">${icon("arrow",15,"#fff")}</button>
        <div style="flex:1;background:rgba(255,255,255,.2);border-radius:12px;display:flex;align-items:center;gap:8px;padding:9px 12px">
          ${icon("search",15,"rgba(255,255,255,.8)")}
          <input id="search-input" value="${state.searchQ||""}" placeholder="Missions, tâches, FAQ…" oninput="state.searchQ=this.value;render()" autofocus style="background:none;border:none;color:#fff;font-size:14px;outline:none;width:100%;font-family:'Poppins',sans-serif"/>
          ${state.searchQ?`<button onclick="state.searchQ='';render()" style="background:none;border:none;cursor:pointer;padding:0">${icon("x",14,"rgba(255,255,255,.7)")}</button>`:""}
        </div>
      </div>
    `)}
    <div style="padding:0 15px">
      ${!q?`<div style="text-align:center;padding:44px 20px;color:${C.gray}"><div style="font-size:44px;margin-bottom:10px">🔍</div><p style="font-family:'Montserrat',sans-serif;font-weight:700;font-size:15px;color:${C.dark};margin-bottom:6px">Recherche globale</p><p style="font-size:13px;margin:0">Cherchez dans toutes les missions, tâches, FAQ et commentaires.</p></div>`:
        results.length===0?`<div style="text-align:center;padding:40px;color:${C.gray}"><p style="font-size:36px">😕</p><p>Aucun résultat pour « ${state.searchQ} »</p></div>`:
        `<div style="padding-top:14px"><p style="font-size:12px;color:${C.gray};margin-bottom:10px">${results.length} résultat${results.length>1?"s":""}</p>
          ${results.map(r=>card(`
            <div style="display:flex;gap:12px;align-items:center">
              <div style="width:38px;height:38px;border-radius:10px;background:${r.color}18;display:flex;align-items:center;justify-content:center;flex-shrink:0">${icon(r.icon,18,r.color)}</div>
              <div style="flex:1;min-width:0">
                <div style="font-size:10px;font-weight:700;color:${r.color};text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px">${typeLabel[r.type]}</div>
                <div style="font-size:13px;font-weight:600;color:${C.dark};line-height:1.3">${r.label}</div>
                <div style="font-size:11px;color:${C.gray};margin-top:2px">${r.sub}</div>
              </div>
            </div>`,`navigate('mission',{missionId:'${r.mid}',eventId:'${state.currentEventId}'})`)).join("")}
        </div>`
      }
    </div>
    ${nav()}`;
}

// ── PAGE: ADMIN ───────────────────────────────────────────────────────────────

        ${icon("plus",17,"#fff")} Créer une nouvelle mission

      ${isSuperAdmin()?`<button onclick="openCategoriesModal()" style="display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:11px;background:#fff;border:2px dashed ${C.magenta};border-radius:12px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:13px;cursor:pointer;color:${C.magenta};margin-bottom:4px">${icon("edit",15,C.magenta)} Gérer les catégories</button>`:""}

            <div style="display:flex;gap:5px;align-items:center">${badge(m.categorie)}${m.statut==="brouillon"?`<span style="background:#f39c12;color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px">BROUILLON</span>`:""}</div>

              <button onclick="openMissionModal('${encodeURIComponent(JSON.stringify(m))}')" style="background:${C.grayLight};border:none;border-radius:8px;padding:6px 8px;cursor:pointer">${icon("edit",13,C.orangeVif)}</button>

            </div>
          </div>
          <h4 style="margin:5px 0;font-family:'Montserrat',sans-serif;font-weight:800;font-size:13px;color:${C.dark}">${m.titre}</h4>
          <div style="font-size:11px;color:${C.gray};display:flex;gap:10px;flex-wrap:wrap">
            ${isMultiDay(m) ? `<span style="background:#8e44ad18;color:#8e44ad;font-weight:700;border-radius:6px;padding:2px 7px;font-size:10px">📅 Multi-jours</span>` : ""}

          </div>
          ${progressBar(m.taches)}
        </div>`).join("")}`;
  }
  if (tab==="inscrits") {
    tabContent = `
      <div style="background:#fff;border-radius:14px;padding:12px 14px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.06);display:flex;justify-content:space-between">

      </div>
      ${state.missions.filter(m=>(m.inscrits||[]).length>0).map(m=>`

function renderModal() {
  if (!state.modal) return "";
  const { type, data } = state.modal;

  if (type==="inscription") {
    return modal("✊ Rejoindre cette mission",`
      ${field("Prénom *", `<input id="i-prenom" type="text" placeholder="Votre prénom" style="width:100%;padding:11px 13px;border:2px solid #eee;border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;outline:none" onfocus="this.style.borderColor='${C.magenta}'" onblur="this.style.borderColor='#eee'"/>`)}
      ${field("Nom *", `<input id="i-nom" type="text" placeholder="Votre nom" style="width:100%;padding:11px 13px;border:2px solid #eee;border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;outline:none" onfocus="this.style.borderColor='${C.magenta}'" onblur="this.style.borderColor='#eee'"/>`)}
      ${field("Email *", `<input id="i-email" type="email" placeholder="votre@email.fr" style="width:100%;padding:11px 13px;border:2px solid #eee;border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;outline:none" onfocus="this.style.borderColor='${C.magenta}'" onblur="this.style.borderColor='#eee'"/>`)}
      ${field("Téléphone *", `<input id="i-tel" type="tel" placeholder="06 XX XX XX XX" style="width:100%;padding:11px 13px;border:2px solid #eee;border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;outline:none" onfocus="this.style.borderColor='${C.magenta}'" onblur="this.style.borderColor='#eee'"/>`)}
      <div id="i-err" style="display:none;color:${C.red};font-size:13px;margin-bottom:8px"></div>

        : `<input id="c-auteur" type="text" placeholder="Prénom Nom" style="width:100%;padding:11px 13px;border:2px solid #eee;border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;outline:none" onfocus="this.style.borderColor='${C.magenta}'" onblur="this.style.borderColor='#eee'"/>`
      )}
      <div id="c-custom-wrap" style="display:none;margin-top:8px"><input id="c-custom" type="text" placeholder="Prénom Nom" style="width:100%;padding:11px 13px;border:2px solid #eee;border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;outline:none" onfocus="this.style.borderColor='${C.magenta}'" onblur="this.style.borderColor='#eee'"/></div>
      ${field("Commentaire", `<textarea id="c-texte" rows="4" placeholder="Partagez votre retour…" style="width:100%;padding:11px 13px;border:2px solid #eee;border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;outline:none;resize:vertical" onfocus="this.style.borderColor='${C.magenta}'" onblur="this.style.borderColor='#eee'"></textarea>`)}
      ${btnPri("Publier",`submitComment('${data.mid}')`)}

    const inscrits = m?.inscrits||[];
    return modal(t?"✏️ Modifier la tâche":"➕ Nouvelle tâche",`
      ${field("Description *", `<input id="t-texte" type="text" value="${(t?.texte||"").replace(/"/g,'&quot;')}" placeholder="Ex: Installer les tables" style="width:100%;padding:11px 13px;border:2px solid #eee;border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;outline:none" onfocus="this.style.borderColor='${C.magenta}'" onblur="this.style.borderColor='#eee'"/>`)}
      ${field("Date de réalisation", `<input id="t-date" type="date" value="${t?.date||today()}" style="width:100%;padding:11px 13px;border:2px solid #eee;border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;outline:none"/>`)}
      ${field("Responsable", `<select id="t-resp" style="width:100%;padding:11px 13px;border:2px solid #eee;border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;outline:none"><option value="">-- Non assigné --</option>${inscrits.map(i=>`<option value="${i.id}" ${t?.responsableId===i.id?"selected":""}>${i.prenom} ${i.nom}</option>`).join("")}</select>${inscrits.length===0?`<p style="font-size:11px;color:${C.gray};margin:5px 0 0">ℹ️ Inscrivez des bénévoles d'abord pour les assigner.</p>`:""}`)}
      ${btnPri("💾 Enregistrer",`submitTache('${data.mid}',${data.tIdx!==null&&data.tIdx!==undefined?data.tIdx:"null"})`)}
    `);
  }

  if (type==="faq") {
    const m = state.missions.find(x=>x.id===data.mid);
    const f = data.fIdx!==null&&data.fIdx!==undefined ? m?.faq[data.fIdx] : null;
    return modal(f?"✏️ Modifier la question":"➕ Nouvelle question FAQ",`
      ${field("Question *", `<input id="f-q" type="text" value="${(f?.question||"").replace(/"/g,'&quot;')}" placeholder="Ex: Que faire si…" style="width:100%;padding:11px 13px;border:2px solid #eee;border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;outline:none" onfocus="this.style.borderColor='${C.magenta}'" onblur="this.style.borderColor='#eee'"/>`)}
      ${field("Réponse *", `<textarea id="f-r" rows="4" style="width:100%;padding:11px 13px;border:2px solid #eee;border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;outline:none;resize:vertical" onfocus="this.style.borderColor='${C.magenta}'" onblur="this.style.borderColor='#eee'">${f?.reponse||""}</textarea>`)}
      ${btnPri("💾 Enregistrer",`submitFaq('${data.mid}',${data.fIdx!==null&&data.fIdx!==undefined?data.fIdx:"null"})`)}
    `);
  }

  if (type==="lien") {
    const m = state.missions.find(x=>x.id===data.mid);
    const l = data.lIdx!==null&&data.lIdx!==undefined ? m?.liensUtiles[data.lIdx] : null;
    return modal(l?"✏️ Modifier le lien":"➕ Ajouter un lien / outil",`
      ${field("Libellé *", `<input id="l-label" type="text" value="${(l?.label||"").replace(/"/g,'&quot;')}" placeholder="Ex: Liste des inscrits" style="width:100%;padding:11px 13px;border:2px solid #eee;border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;outline:none" onfocus="this.style.borderColor='${C.magenta}'" onblur="this.style.borderColor='#eee'"/>`)}
      ${field("URL *", `<input id="l-url" type="url" value="${(l?.url||"").replace(/"/g,'&quot;')}" placeholder="https://…" style="width:100%;padding:11px 13px;border:2px solid #eee;border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;outline:none" onfocus="this.style.borderColor='${C.magenta}'" onblur="this.style.borderColor='#eee'"/>`)}
      ${btnPri("💾 Enregistrer",`submitLien('${data.mid}',${data.lIdx!==null&&data.lIdx!==undefined?data.lIdx:"null"})`)}
    `);
  }

  if (type==="mission") {
    const m = data.id ? data : null;
    const eid = state._missionEid || data.eid || state.currentEventId || "";
    const brief = m?.brief||{};
    const chef = m?.chefMission||{};
    const mTab = state._modalMissionTab||"infos";
    return modal(m?"✏️ Modifier la mission":"➕ Nouvelle mission",`
      <div style="display:flex;gap:6px;margin-bottom:16px">
        ${[["infos","Infos"],["brief","Brief"],["chef","Chef"]].map(([k,l])=>`<button onclick="switchMissionTab('${k}')" style="padding:6px 14px;border-radius:99px;border:2px solid ${mTab===k?C.magenta:"#eee"};background:${mTab===k?C.magenta:"#fff"};color:${mTab===k?"#fff":C.dark};font-family:'Montserrat',sans-serif;font-weight:700;font-size:11px;cursor:pointer">${l}</button>`).join("")}
      </div>
      <div id="modal-mission-content">
        ${missionModalContent(mTab, m, brief, chef, eid)}
      </div>
    `);
  }

  if (type==="newEvent"||type==="editEvent") {
    const e = type==="editEvent"?data:{};
    return modal(type==="editEvent"?"✏️ Modifier l'événement":"➕ Nouvel événement",`
      ${field("Nom de l'événement *", `<input id="ev-nom" type="text" value="${(e.nom||"").replace(/"/g,'&quot;')}" placeholder="Ex: Défi Enfance Paris 2027" style="width:100%;padding:11px 13px;border:2px solid #eee;border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;outline:none" onfocus="this.style.borderColor='${C.magenta}'" onblur="this.style.borderColor='#eee'"/>`)}
      ${field("Hashtag *", `<input id="ev-hashtag" type="text" value="${(e.hashtag||"").replace(/"/g,'&quot;')}" placeholder="#Paris2027" style="width:100%;padding:11px 13px;border:2px solid #eee;border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;outline:none" onfocus="this.style.borderColor='${C.magenta}'" onblur="this.style.borderColor='#eee'"/>`)}
      ${field("Date", `<input id="ev-date" type="date" value="${e.date||""}" style="width:100%;padding:11px 13px;border:2px solid #eee;border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;outline:none"/>`)}
      ${field("Lieu", `<input id="ev-lieu" type="text" value="${(e.lieu||"").replace(/"/g,'&quot;')}" placeholder="Parc, ville…" style="width:100%;padding:11px 13px;border:2px solid #eee;border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;outline:none" onfocus="this.style.borderColor='${C.magenta}'" onblur="this.style.borderColor='#eee'"/>`)}
      ${field("Couleur", `<input id="ev-couleur" type="color" value="${e.couleur||C.magenta}" style="width:60px;height:40px;border:2px solid #eee;border-radius:10px;cursor:pointer;padding:2px"/>`)}
      ${btnPri("💾 Enregistrer",`submitEvent('${e.id||""}')`)}
    `);
  }

  if (type==="cloneEvent") {
    return modal("📋 Cloner un événement",`
      <p style="font-size:13px;color:${C.gray};margin-bottom:16px">Crée un nouvel événement avec les mêmes missions (inscrits et commentaires remis à zéro).</p>
      ${field("Nom du nouvel événement *", `<input id="cl-nom" type="text" placeholder="Ex: Défi Enfance Paris 2027" style="width:100%;padding:11px 13px;border:2px solid #eee;border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;outline:none" onfocus="this.style.borderColor='${C.magenta}'" onblur="this.style.borderColor='#eee'"/>`)}
      ${field("Hashtag *", `<input id="cl-hashtag" type="text" placeholder="#Paris2027" style="width:100%;padding:11px 13px;border:2px solid #eee;border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;outline:none" onfocus="this.style.borderColor='${C.magenta}'" onblur="this.style.borderColor='#eee'"/>`)}
      ${field("Date", `<input id="cl-date" type="date" style="width:100%;padding:11px 13px;border:2px solid #eee;border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;outline:none"/>`)}
      ${field("Lieu", `<input id="cl-lieu" type="text" placeholder="Parc, ville…" style="width:100%;padding:11px 13px;border:2px solid #eee;border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;outline:none" onfocus="this.style.borderColor='${C.magenta}'" onblur="this.style.borderColor='#eee'"/>`)}
      ${field("Couleur", `<input id="cl-couleur" type="color" value="${C.orange}" style="width:60px;height:40px;border:2px solid #eee;border-radius:10px;cursor:pointer;padding:2px"/>`)}
      ${btnPri("📋 Cloner l'événement",`submitClone('${data.sourceId}')`)}
    `);
  }

  if (type==="user") {
    const u = data.uid ? data : {};
    const parts = (u.nom||"").split(" ");
    const uPrenom = parts[0]||""; const uNomF = parts.slice(1).join(" ")||"";
    return modal(u.uid?"✏️ Modifier l'utilisateur":"➕ Nouvel utilisateur",`
      ${field("Prénom *", `<input id="u-prenom" type="text" value="${uPrenom.replace(/"/g,'&quot;')}" placeholder="Prénom" style="width:100%;padding:11px 13px;border:2px solid #eee;border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;outline:none" onfocus="this.style.borderColor='${C.magenta}'" onblur="this.style.borderColor='#eee'"/>`)}
      ${field("Nom *", `<input id="u-nom" type="text" value="${uNomF.replace(/"/g,'&quot;')}" placeholder="Nom de famille" style="width:100%;padding:11px 13px;border:2px solid #eee;border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;outline:none" onfocus="this.style.borderColor='${C.magenta}'" onblur="this.style.borderColor='#eee'"/>`)}
      ${field("Email *", `<input id="u-email" type="email" value="${(u.email||"").replace(/"/g,'&quot;')}" placeholder="email@example.fr" style="width:100%;padding:11px 13px;border:2px solid #eee;border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;outline:none" onfocus="this.style.borderColor='${C.magenta}'" onblur="this.style.borderColor='#eee'"/>`)}
      ${field("Rôle", `<select id="u-role" style="width:100%;padding:11px 13px;border:2px solid #eee;border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;outline:none"><option value="superAdmin" ${u.role==="superAdmin"?"selected":""}>👑 Super Administrateur</option><option value="admin" ${u.role==="admin"||!u.role?"selected":""}>⚙️ Administrateur</option></select>`)}
      <p style="font-size:11px;color:${C.gray};margin-bottom:12px">⚠️ Pour modifier le mot de passe, utilisez la console Firebase Authentication.</p>
      ${btnPri("💾 Enregistrer",`submitUser('${u.uid||""}')`)}
    `);
  }


  if (type==="categories") {
    const cats = CATEGORIES.slice(1);
    const inp_style = "flex:1;padding:10px 12px;border:2px solid #eee;border-radius:10px;font-size:13px;outline:none";
    const btn_style = "background:#fff0f0;border:none;border-radius:8px;padding:6px 8px;cursor:pointer;font-size:18px;color:" + C.red;
    const rowsHtml = cats.map(c => {
      const color = CAT_COLORS[c] || C.magenta;
      return `<div class="cat-row" style="display:flex;gap:8px;align-items:center;margin-bottom:8px">` +
        `<input class="cat-name" type="text" value="${c}" style="${inp_style}"/>` +
        `<input class="cat-color" type="color" value="${color}" style="width:42px;height:38px;border:2px solid #eee;border-radius:8px;cursor:pointer;padding:2px"/>` +
        `<button onclick="this.parentElement.remove()" style="${btn_style}">×</button>` +
        `</div>`;
    }).join("");
    const desc = "Modifiez, supprimez ou ajoutez des cat\u00e9gories.";
    const addBtn = `<button onclick="addCatRow()" style="display:flex;align-items:center;justify-content:center;gap:6px;background:${C.grayLight};border:none;border-radius:10px;padding:9px 14px;cursor:pointer;font-weight:700;font-size:12px;color:${C.dark};margin-bottom:14px;width:100%">+ Ajouter une cat\u00e9gorie</button>`;
    return modal("\uD83C\uDFF7\uFE0F G\u00e9rer les cat\u00e9gories",
      `<p style="font-size:12px;color:${C.gray};margin-bottom:14px">${desc}</p>` +
      `<div id="cat-rows">${rowsHtml}</div>` +
      addBtn +
      btnPri("\uD83D\uDCBE Enregistrer les cat\u00e9gories", "submitCategories()")
    );
  }

  return "";
}

function missionModalContent(mTab, m, brief, chef, eid) {
  const IS = "width:100%;padding:11px 13px;border:2px solid #eee;border-radius:10px;font-size:14px;outline:none";
  const IS_SM = "width:100%;padding:11px 8px;border:2px solid #eee;border-radius:10px;font-size:13px;outline:none";
  const onF = "onfocus=\"this.style.borderColor='" + C.magenta + "'\""
  const onB = "onblur=\"this.style.borderColor='#eee'\""

  if (mTab==="infos") {
    const isNew = !m?.id; // Only show duplication for brand new missions
    // Merge draft (typed values) over saved data
    const d = state._missionDraft;
    const dateType = d.dateType ?? m?.dateType ?? "jour";

function render() {
  const app = document.getElementById("app");
  if (!app) return;
  if (state.loading) { app.innerHTML = `<div class="spinner"></div>`; return; }

  let pageHtml = "";
  if (state.page==="events")  pageHtml = pageEvents();
  else if (state.page==="event")   pageHtml = pageEvent();
  else if (state.page==="mission") pageHtml = pageMission();
  else if (state.page==="search")  pageHtml = pageSearch();
  else if (state.page==="admin" && isAdmin())  pageHtml = pageAdmin();
  else if (state.page==="login")   pageHtml = pageLogin();
  else pageHtml = pageEvents();

  const toastHtml = state.toast ? `<div style="position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:${C.dark};color:#fff;padding:12px 22px;border-radius:12px;z-index:9999;font-family:'Poppins',sans-serif;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.35);animation:slideUp .3s ease;white-space:nowrap">${state.toast}</div>` : "";

  app.innerHTML = pageHtml + renderModal() + toastHtml;

  // Auto-focus search
  if (state.page==="search") {
    setTimeout(()=>document.getElementById("search-input")?.focus(),50);
  }
}

// Save current mission form fields into draft before switching tabs
function saveMissionDraftFromDOM() {
  const d = state._missionDraft;
  const g = (id) => document.getElementById(id)?.value ?? null;
  const gc = (id) => document.getElementById(id)?.checked ?? null;
  const titreVal = g("m-titre"); if (titreVal !== null) d.titre = titreVal;
  if (g("m-cat")      !== null) d.categorie    = g("m-cat");
  if (g("m-lieu")     !== null) d.lieu         = g("m-lieu");
  if (g("m-datetype") !== null) d.dateType     = g("m-datetype");
  if (g("m-date-debut")!==null) d.dateDebut    = g("m-date-debut");
  if (g("m-date-fin") !== null) d.dateFin      = g("m-date-fin");
  if (gc("m-sans-horaire")!==null) d.sansHoraire = gc("m-sans-horaire");
  if (g("m-rdv")      !== null) d.rdvHeure     = g("m-rdv");
  if (g("m-fin")      !== null) d.finHeure     = g("m-fin");
  if (g("m-brief-h")  !== null) d.briefingHeure= g("m-brief-h");
  if (g("m-nb")       !== null) d.nbBenevoles  = parseInt(g("m-nb"))||4;
  if (g("m-video")    !== null) d.videoUrl     = g("m-video");
  if (g("m-obj")      !== null) d.brief = { ...d.brief, objectifs:   g("m-obj") };
  if (g("m-tech")     !== null) d.brief = { ...d.brief, technique:   g("m-tech") };
  if (g("m-collab")   !== null) d.brief = { ...d.brief, collaboration:g("m-collab") };
  if (g("m-eval")     !== null) d.brief = { ...d.brief, evaluation:  g("m-eval") };
  if (g("m-chef-nom") !== null) d.chefMission = { ...d.chefMission, nom:  g("m-chef-nom") };
  if (g("m-chef-email")!==null) d.chefMission = { ...d.chefMission, email:g("m-chef-email") };
  if (g("m-chef-tel") !== null) d.chefMission = { ...d.chefMission, tel:  g("m-chef-tel") };
  // preserve dup checkboxes
  const dups = [...document.querySelectorAll(".m-dup-event:checked")].map(x=>x.value);
  if (dups.length > 0) d._dupEvents = dups;
}

function switchMissionTab(tab) {
  saveMissionDraftFromDOM();
  state._modalMissionTab = tab;
  renderModalOnly();
}

function renderModalOnly() {
  const overlay = document.getElementById("modal-overlay");
  if (overlay) overlay.outerHTML = renderModal();
  else { const app=document.getElementById("app"); app.innerHTML+=renderModal(); }
  render();
}

window.submitMission = async (mid, eid, isDraft=false) => {
  // Use state._missionEid as reliable fallback
  const resolvedEid = (eid && eid !== "undefined" && eid !== "null") ? eid : (state._missionEid || state.currentEventId || "");
  // Always save draft state first (in case we're on Brief or Chef tab)
  saveMissionDraftFromDOM();
  const d = state._missionDraft;
  const existing = mid ? state.missions.find(x=>x.id===mid) : null;
  // Get titre: DOM first, then draft, then existing mission
  const domTitre = document.getElementById("m-titre")?.value?.trim() ?? null;
  const draftTitre = (d.titre && d.titre.trim()) ? d.titre.trim() : null;
  const existingTitre = existing?.titre?.trim() || null;
  const finalTitre = domTitre || draftTitre || existingTitre || "";
  // Require titre only when publishing (not brouillon)
  if (!finalTitre && !isDraft) { showToast("⚠️ Le titre est obligatoire pour publier."); return; }
  const data = {
    ...(existing||{}),
    titre: finalTitre || (isDraft ? "Sans titre" : ""),
    categorie: document.getElementById("m-cat")?.value || d.categorie || existing?.categorie || "Accueil",
    lieu: document.getElementById("m-lieu")?.value?.trim() || d.lieu || existing?.lieu || "",
    dateType: document.getElementById("m-datetype")?.value || d.dateType || existing?.dateType || "jour",
    dateDebut: document.getElementById("m-date-debut")?.value || d.dateDebut || existing?.dateDebut || "",
    dateFin: document.getElementById("m-date-fin")?.value || d.dateFin || existing?.dateFin || "",
    sansHoraire: document.getElementById("m-sans-horaire") ? document.getElementById("m-sans-horaire").checked : (d.sansHoraire ?? existing?.sansHoraire ?? false),
    rdvHeure: document.getElementById("m-rdv")?.value || d.rdvHeure || existing?.rdvHeure || "",
    finHeure: document.getElementById("m-fin")?.value || d.finHeure || existing?.finHeure || "",
    briefingHeure: document.getElementById("m-brief-h")?.value || d.briefingHeure || existing?.briefingHeure || "",
    nbBenevoles: parseInt(document.getElementById("m-nb")?.value) || d.nbBenevoles || existing?.nbBenevoles || 4,
    videoUrl: document.getElementById("m-video")?.value?.trim() || d.videoUrl || existing?.videoUrl || "",
    brief: {
      objectifs: document.getElementById("m-obj")?.value?.trim() || d.brief?.objectifs || existing?.brief?.objectifs || "",
      technique: document.getElementById("m-tech")?.value?.trim() || d.brief?.technique || existing?.brief?.technique || "",
      collaboration: document.getElementById("m-collab")?.value?.trim() || d.brief?.collaboration || existing?.brief?.collaboration || "",
      evaluation: document.getElementById("m-eval")?.value?.trim() || d.brief?.evaluation || existing?.brief?.evaluation || "",
    },
    chefMission: {
      nom: document.getElementById("m-chef-nom")?.value?.trim() || d.chefMission?.nom || existing?.chefMission?.nom || "",
      email: document.getElementById("m-chef-email")?.value?.trim() || d.chefMission?.email || existing?.chefMission?.email || "",
      tel: document.getElementById("m-chef-tel")?.value?.trim() || d.chefMission?.tel || existing?.chefMission?.tel || "",
    },
    statut: isDraft ? "brouillon" : "actif",
    inscrits: existing?.inscrits||[],
    taches: existing?.taches||[],
    faq: existing?.faq||[],
    commentaires: existing?.commentaires||[],
    liensUtiles: existing?.liensUtiles||[],
  };
  if(mid) data.id=mid;
  await saveMission(data, isDraft, resolvedEid);
  // Duplication uniquement pour les nouvelles missions (jamais pour les modifications)
  if (!mid) {
    const allDups = [...document.querySelectorAll(".m-dup-event:checked")];
    const otherDups = allDups.filter(b => b.value !== resolvedEid);
    for (const box of otherDups) {
      const dupData = { ...data }; delete dupData.id;
      await addDoc(missionsCol(box.value), { ...dupData, inscrits:[], commentaires:[], createdAt:serverTimestamp() });
    }
    if (otherDups.length > 0) showToast("✅ Dupliquée sur " + otherDups.length + " autre(s) événement(s) !");
  }
};

  const role=document.getElementById("u-role")?.value||"admin";
  if(!prenom||!nomF||!email) return showToast("⚠️ Prénom, nom et email sont requis.");
  if(uid) await saveUserMeta(uid,{nom,email,role});
  else showToast("⚠️ Créez d'abord l'utilisateur dans Firebase Auth, puis revenez ici pour lui assigner un rôle.");
  closeModal();
};

// ── CATEGORIES MGMT ───────────────────────────────────────────────────────────
const categoriesDoc = () => doc(db, "config", "categories");

async function loadCategories() {
  try {
    const snap = await getDoc(categoriesDoc());
    if (snap.exists()) {
      const data = snap.data();
      CATEGORIES = ["Toutes", ...data.list];
      CAT_COLORS = { ...DEFAULT_CAT_COLORS, ...data.colors };
    }
  } catch(e) {}
}

async function saveCategories(list, colors) {
  await setDoc(categoriesDoc(), { list, colors });
  CATEGORIES = ["Toutes", ...list];
  CAT_COLORS = { ...DEFAULT_CAT_COLORS, ...colors };
  showToast("✅ Catégories mises à jour !"); closeModal(); render();
}

window.openCategoriesModal = () => openModal('categories', {});

window.submitCategories = async () => {
  const rows = document.querySelectorAll(".cat-row");
  const list = []; const colors = {};
  rows.forEach(row => {
    const name = row.querySelector(".cat-name")?.value?.trim();
    const color = row.querySelector(".cat-color")?.value;
    if (name) { list.push(name); colors[name] = color || C.magenta; }
  });
  if (!list.length) return showToast("⚠️ Ajoutez au moins une catégorie.");
  await saveCategories(list, colors);
};

window.addCatRow = () => {
  const container = document.getElementById("cat-rows");
  if (!container) return;
  const div = document.createElement("div");
  div.className = "cat-row";
  div.style.cssText = "display:flex;gap:8px;align-items:center;margin-bottom:8px";
  div.innerHTML = `<input class="cat-name" type="text" placeholder="Nom de la catégorie" style="flex:1;padding:10px 12px;border:2px solid #eee;border-radius:10px;font-family:'Poppins',sans-serif;font-size:13px;outline:none"/><input class="cat-color" type="color" value="${C.magenta}" style="width:42px;height:38px;border:2px solid #eee;border-radius:8px;cursor:pointer;padding:2px"/><button onclick="this.parentElement.remove()" style="background:#fff0f0;border:none;border-radius:8px;padding:6px 8px;cursor:pointer;font-size:16px;color:${C.red}">×</button>`;
  container.appendChild(div);
};


// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  await initFirestore();
  await loadCategories();
  await loadEvents();
  render();
}
init();
</script>
